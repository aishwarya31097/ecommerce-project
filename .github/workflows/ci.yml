name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # GitHub-hosted runners: run JS-based actions on Node 24 (see changelog 2025-09-19).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Next.js inlines these at build time; CI must define them so `next build` succeeds.
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_DEMO_USER_ID: "ci-demo-placeholder-user-id"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm version comes only from root package.json `packageManager` (no duplicate pin here).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec turbo run lint

      - name: Typecheck
        run: pnpm exec turbo run check-types

      - name: Build
        run: pnpm exec turbo run build
