services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_ecommerce_data:/var/lib/mysql

volumes:
  mysql_ecommerce_data:
